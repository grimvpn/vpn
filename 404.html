<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root { --tw-color-primary: #00ff9d; }
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #0a0a0a; color: #f0f0f0; }
        .header-bg { background: linear-gradient(180deg, #0a0a0a 0%, #111111 100%); }
        .error-wrapper h1 { font-size: 180px; line-height: 1; font-weight: 900; letter-spacing: -10px; text-shadow: 0 0 60px rgb(0 255 157 / 0.6); color: #00ff9d; }
        @media (max-width: 768px) { .error-wrapper h1 { font-size: 120px; } }
    </style>
</head>
<body class="antialiased">

    <header class="header-bg border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-[#00ff9d] rounded-2xl flex items-center justify-center text-black font-bold text-2xl rotate-12">G</div>
                <h1 class="text-3xl font-semibold tracking-tighter">grim</h1>
            </div>
        </div>
    </header>

    <div class="error-wrapper min-h-[calc(100vh-73px)] flex items-center justify-center text-center px-6">
        <div>
            <h1 class="text-[#00ff9d]">404</h1>
            <h2 class="text-4xl font-semibold mt-4">Страница не найдена</h2>
            <p id="random-message" class="text-xl text-white/80 max-w-md mx-auto mt-6">Упс! Страница, которую вы ищете, не существует или была перемещена.</p>
            <a href="index" class="mt-10 inline-block px-10 py-5 bg-[#00ff9d] text-black font-semibold text-xl rounded-3xl hover:scale-105 transition-all">Вернуться на главную</a>
        </div>
    </div>

    <script>
        const messages = [
            "Упс! Кажется, вы в неизвестной части интернета.",
            "Упс! Похоже, страница потерялась в цифровых джунглях.",
            "Упс! Кажется, эта страница заблудилась.",
            "Упс! Страница растворилась в тумане."
        ];
        function setRandomMessage() {
            document.getElementById('random-message').textContent = messages[Math.floor(Math.random() * messages.length)];
        }
        window.onload = setRandomMessage;
    </script>
</body>
</html>
