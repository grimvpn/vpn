<!DOCTYPE html>
<html>
<head>
    <script type="module" src="https://unpkg.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        model-viewer { 
            width: 100%; 
            height: 100%; 
            background: transparent; 
            outline: none;
            --progress-bar-color: #00ff9d;
        }
    </style>
</head>
<body>
    <model-viewer 
        src="laptop.glb" 
        camera-orbit="-145deg 75deg 100%"
        camera-controls 
        disable-zoom 
        disable-pan
        interaction-prompt="none"
        min-polar-angle="90deg" 
        max-polar-angle="90deg"
        touch-action="pan-y"
        autoplay
        loading="eager"
        reveal="auto">
    </model-viewer>
</body>
</html>
