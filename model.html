<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }
        model-viewer {
            width: 100%;
            height: 100%;
            background: transparent;
            --poster-color: transparent;
            --min-polar-angle: 45deg;
            --max-polar-angle: 135deg;
        }
    </style>
</head>
<body>
    <model-viewer
        src="laptop.glb"
        camera-orbit="-150deg 75deg 100%"
        camera-controls
        disable-zoom
        disable-pan
        interaction-prompt="none"
        min-polar-angle="90deg"
        max-polar-angle="90deg"
        loading="eager">
    </model-viewer>
</body>
</html>
